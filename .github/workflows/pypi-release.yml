name: Publish arrayscope to PyPI

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
      - name: Build package
        run: python -m build
      - name: Check package
        run: python -m twine check dist/*
      - name: Install wheel and verify package versions
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          import os
          from importlib.metadata import metadata, version

          import arrayscope

          package_name = metadata("ArrayScope")["Name"]
          metadata_version = version("ArrayScope")
          runtime_version = arrayscope.__version__
          release_tag = os.environ["RELEASE_TAG"]
          tag_version = release_tag[1:] if release_tag.startswith("v") else release_tag

          if package_name != "ArrayScope":
              raise SystemExit(f"Unexpected package name {package_name!r}")
          if runtime_version != metadata_version:
              raise SystemExit(
                  f"Runtime version {runtime_version!r} does not match package metadata {metadata_version!r}"
              )
          if tag_version != metadata_version:
              raise SystemExit(
                  f"Release tag {release_tag!r} does not match {package_name} version {metadata_version!r}"
              )
          print(f"{package_name} {metadata_version}")
          PY
          python -m arrayscope --help
      - name: Publish to PyPI
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: python -m twine upload --username __token__ --password "$TWINE_PASSWORD" dist/*
