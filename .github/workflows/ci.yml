name: Cross-platform screenshot test

on:
  push:
  pull_request:

jobs:
  screenshot:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13', '3.14']

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgl1 libegl1

      - name: Install ndslice
        run: pip install -e .

      - name: Run screenshot test (Linux)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: python test/screenshot_test.py --style Fusion

      - name: Run screenshot test (macOS / Windows)
        if: runner.os != 'Linux'
        run: python test/screenshot_test.py --style Fusion

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.os }}-py${{ matrix.python-version }}
          path: test/screenshots/
          if-no-files-found: error
