name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYQTGRAPH_QT_LIB: PySide6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  strict-ui:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYQTGRAPH_QT_LIB: PySide6
      ARRAYSCOPE_STRICT_UI: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run strict UI tests
        run: pytest tests/ui -q
